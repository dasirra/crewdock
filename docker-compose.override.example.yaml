# docker-compose.override.yaml — Personal service additions
#
# Copy this file to docker-compose.override.yaml to add your own services
# or override gateway settings. Docker Compose merges it automatically.
# docker-compose.override.yaml is gitignored.

services:
  # Example: use a custom Dockerfile with extra tools
  # openclaw-gateway:
  #   build:
  #     dockerfile: Dockerfile.local

  # Example: Syncthing for Obsidian sync
  # syncthing:
  #   image: linuxserver/syncthing:latest
  #   container_name: syncthing
  #   environment:
  #     - PUID=1000
  #     - PGID=1000
  #     - TZ=America/New_York
  #   volumes:
  #     - ./config/syncthing:/config
  #     - ./workspace:/data
  #   ports:
  #     - "8385:8384"
  #     - "22001:22000/tcp"
  #     - "22001:22000/udp"
  #     - "21028:21027/udp"
  #   restart: unless-stopped

  # -------------------------------------------------------------------------
  # Advanced / legacy: switch back to host network mode
  #
  # Use this when the container needs full access to all host network
  # interfaces (e.g. LAN service discovery, binding to arbitrary ports).
  # WARNING: this removes network isolation — the container can reach
  # everything on the host network stack, including SSH, SMB, databases,
  # and other local services.
  #
  # Add the block below to your docker-compose.override.yaml to activate.
  # Note: "ports: !reset []" clears the port mappings from the base file,
  # which are incompatible with host network mode.
  # -------------------------------------------------------------------------
  # openclaw-gateway:
  #   network_mode: "host"
  #   ports: !reset []
