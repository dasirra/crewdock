<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Claw marks -->
  <g transform="translate(128,95)">
    <!-- Left talon -->
    <path d="M-8,-68 C-8,-68 -52,-48 -62,-8 C-66,8 -60,18 -50,16 C-42,14 -38,-2 -34,-16 C-28,-36 -14,-50 -8,-54Z"
          fill="url(#g2)"/>
    <!-- Center talon -->
    <path d="M0,-76 C0,-76 -4,-50 -4,-28 C-4,-6 -2,16 0,32 C2,16 4,-6 4,-28 C4,-50 0,-76 0,-76Z"
          fill="url(#g1)"/>
    <!-- Right talon -->
    <path d="M8,-68 C8,-68 52,-48 62,-8 C66,8 60,18 50,16 C42,14 38,-2 34,-16 C28,-36 14,-50 8,-54Z"
          fill="url(#g2)"/>
  </g>

  <!-- Anchor -->
  <g transform="translate(128,155)">
    <!-- Crossbar -->
    <line x1="-44" y1="0" x2="44" y2="0" stroke="#A78BFA" stroke-width="5" stroke-linecap="round"/>
    <!-- Ring -->
    <circle cx="0" cy="-14" r="10" fill="none" stroke="#A78BFA" stroke-width="4"/>
    <!-- Shank -->
    <line x1="0" y1="-4" x2="0" y2="52" stroke="#A78BFA" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Flukes -->
    <path d="M-28,42 C-28,42 -10,62 0,62 C10,62 28,42 28,42" fill="none" stroke="#A78BFA" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Fluke tips -->
    <path d="M-30,40 L-36,34" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
    <path d="M30,40 L36,34" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>