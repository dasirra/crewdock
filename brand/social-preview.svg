<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0D1A"/>
      <stop offset="100%" stop-color="#1a1440"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle radial glow behind logo -->
  <ellipse cx="640" cy="280" rx="500" ry="300" fill="url(#glow1)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.04">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#A78BFA"/>
    </pattern>
    <rect width="1280" height="640" fill="url(#dots)"/>
  </g>

  <!-- Horizontal lockup centered (visually balanced) -->
  <g transform="translate(570,270)">
    <!-- Icon -->
    <g transform="translate(-220,0)">
      <!-- Claw marks -->
      <g transform="translate(0,-18)">
        <path d="M-9,-60 C-9,-60 -48,-42 -56,-8 C-60,8 -54,16 -45,15 C-38,13 -34,-2 -30,-15 C-25,-32 -14,-46 -9,-49Z"
              fill="url(#g2)"/>
        <path d="M0,-68 C0,-68 -4,-44 -4,-24 C-4,-5 -1,15 0,28 C1,15 4,-5 4,-24 C4,-44 0,-68 0,-68Z"
              fill="url(#g1)"/>
        <path d="M9,-60 C9,-60 48,-42 56,-8 C60,8 54,16 45,15 C38,13 34,-2 30,-15 C25,-32 14,-46 9,-49Z"
              fill="url(#g2)"/>
      </g>
      <!-- Anchor -->
      <g transform="translate(0,40)">
        <line x1="-40" y1="0" x2="40" y2="0" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
        <circle cx="0" cy="-12" r="9" fill="none" stroke="#A78BFA" stroke-width="3.5"/>
        <line x1="0" y1="-3" x2="0" y2="46" stroke="#A78BFA" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M-24,38 C-24,38 -8,54 0,54 C8,54 24,38 24,38" fill="none" stroke="#A78BFA" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M-26,36 L-32,30" stroke="#A78BFA" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M26,36 L32,30" stroke="#A78BFA" stroke-width="3.5" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Divider -->
    <line x1="-130" y1="-50" x2="-130" y2="60" stroke="#A78BFA" stroke-width="1.5" opacity="0.25"/>

    <!-- Wordmark -->
    <text x="-105" y="12" font-family="'Helvetica Neue', 'Arial', 'Segoe UI', sans-serif"
          font-size="72" font-weight="700" letter-spacing="8" fill="#E0E0FF">
      CREWDOCK
    </text>

    <!-- Tagline -->
    <text x="-102" y="44" font-family="'Helvetica Neue', 'Arial', 'Segoe UI', sans-serif"
          font-size="16" font-weight="400" letter-spacing="5" fill="#A78BFA" opacity="0.55">
      AUTONOMOUS AI CREW
    </text>
  </g>

  <!-- Description line at bottom -->
  <text x="640" y="490" text-anchor="middle" font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="18" font-weight="400" letter-spacing="1" fill="#A78BFA" opacity="0.35">
    Self-hosted AI agents running 24/7 on your server — built on OpenClaw
  </text>

  <!-- Four agent dots at bottom -->
  <g transform="translate(640,550)">
    <circle cx="-75" cy="0" r="6" fill="#F59E0B" opacity="0.7"/>
    <circle cx="-25" cy="0" r="6" fill="#10B981" opacity="0.7"/>
    <circle cx="25" cy="0" r="6" fill="#3B82F6" opacity="0.7"/>
    <circle cx="75" cy="0" r="6" fill="#EF4444" opacity="0.7"/>
  </g>

  <!-- Thin top/bottom border accent -->
  <rect x="0" y="0" width="1280" height="2" fill="url(#g1)" opacity="0.4"/>
  <rect x="0" y="638" width="1280" height="2" fill="url(#g1)" opacity="0.2"/>
</svg>