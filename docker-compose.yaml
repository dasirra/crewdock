services:
  # --- OPENCLAW GATEWAY ---
  openclaw-gateway:
    build:
      context: .
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-latest}
    container_name: openclaw-gateway
    restart: unless-stopped
    init: true
    network_mode: "host"
    environment:
      - NODE_ENV=production
      - HOME=/home/node
      - NODE_COMPILE_CACHE=/var/tmp/openclaw-compile-cache
      - OPENCLAW_NO_RESPAWN=1
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_CONFIG_DIR=/home/node/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/home/node/.openclaw/workspace
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_BRIDGE_PORT=18790
      - ANTHROPIC_OAUTH_TOKEN=${ANTHROPIC_OAUTH_TOKEN}
      - CLAUDE_CODE_OAUTH_TOKEN=${ANTHROPIC_OAUTH_TOKEN}
      - OPENAI_CODEX_TOKEN=${OPENAI_CODEX_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GH_TOKEN=${GITHUB_TOKEN}
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Claude Dev}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-claude-dev@localhost}
      - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME:-Claude Dev}
      - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL:-claude-dev@localhost}
      - DISCORD_FORGE_TOKEN=${DISCORD_FORGE_TOKEN:-}
      - DISCORD_FORGE_CHANNEL=${DISCORD_FORGE_CHANNEL:-}
      - DISCORD_SCOUTER_TOKEN=${DISCORD_SCOUTER_TOKEN:-}
      - DISCORD_SCOUTER_CHANNEL=${DISCORD_SCOUTER_CHANNEL:-}
      - DISCORD_ALFRED_TOKEN=${DISCORD_ALFRED_TOKEN:-}
      - DISCORD_ALFRED_CHANNEL=${DISCORD_ALFRED_CHANNEL:-}
      - DISCORD_GUILD=${DISCORD_GUILD:-}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - HOOKS_TOKEN=${HOOKS_TOKEN:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - GOOGLE_WORKSPACE_CLI_CREDENTIALS_FILE=/home/node/.config/gws/credentials.json
    volumes:
      - ./config/openclaw:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
      - ./projects:/home/node/projects
      - ./config/claude:/home/node/.claude
      - ./config/gh:/home/node/.config/gh
      - ./config/gws:/home/node/.config/gws
    command: ["node", "dist/index.js", "gateway", "--allow-unconfigured"]
